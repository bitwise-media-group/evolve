# Keep module deps, pinned dev tools, npm lint tools, and SHA-pinned actions fresh.
version: 2
updates:
  - package-ecosystem: gomod
    directories: ["/", "/tools"]
    commit-message:
      include: scope
      prefix: build
      prefix-development: build
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    commit-message:
      include: scope
      prefix: build
      prefix-development: build
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    commit-message:
      include: scope
      prefix: build
      prefix-development: build
    schedule:
      interval: weekly
