#
# evolve consumes the shared toolchain (bitwise-media-group/toolchain) as the
# .mise/ submodule: pinned tools + the go-cli task archetype come from there,
# and the Makefile is a thin forwarder (.mise/mise.mk). Structural knobs live
# in [vars]; repo-local tasks live in tasks.toml (see [task_config] below).

[vars]
app = "evolve"
app_pkg = "./cmd/evolve"
# The report-viewer SPA is embedded into the binary via the withui build tag;
# the ui task (tasks.toml) builds internal/web/ui/dist before go-build compiles.
build_tags = "withui"

[task_config]
# Repo-local tasks live in tasks.toml, included AFTER the archetype so its
# same-named tasks (tidy, fmt, lint, build, fuzz, ci, pr) replace the
# archetype's definitions — an included file wins over this config's own
# [tasks] on name collisions.
includes = [".mise/tasks/go-cli.toml", "tasks.toml"]
