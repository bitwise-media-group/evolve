# Continuous integration — thin caller for the org's reusable ci-go workflow:
# build, vet, race-detector tests with coverage (published to Codecov), a
# govulncheck scan, and prose lint. The Go version comes from go.mod and the Node
# version from .node-version; every gate runs through a Makefile target so local
# `make` and CI run the exact same command.
#
# The reusable workflow is pinned to a full commit SHA (tag in the comment) so a
# moved tag can never change what runs; Dependabot keeps the pin fresh.
name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:

# the reusable workflow's jobs only need contents:read; grant just that ceiling
permissions:
  contents: read

jobs:
  ci:
    uses: bitwise-media-group/github-workflows/.github/workflows/ci-go.yaml@077a003a620f49bd0062c73fc761dbea05d7fb70 # v1.1.0
    with:
      # Default is go.sum; list every lockfile that affects the build. `make vet`
      # also vets the e2e module, and test-coverage/vuln build tools from tools/.
      # e2e/ has no external deps yet (no go.sum), but is listed so the cache key
      # tracks it once it does.
      cache-dependency-path: |
        go.sum
        tools/go.sum
        e2e/go.sum
