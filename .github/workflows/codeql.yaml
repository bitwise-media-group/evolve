# CodeQL security analysis — thin caller for the org's reusable codeql-go
# workflow. Scans the repository's GitHub Actions workflows (build-free) and the
# Go module (autobuild; setup-go matches go.mod), on every push and pull request
# plus a weekly scheduled run so newly published queries reach already-merged
# code.
#
# The reusable workflow is pinned to a full commit SHA (tag in the comment) so a
# moved tag can never change what runs; Dependabot keeps the pin fresh.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "28 20 * * 4"

# ceiling for the reusable workflow's analyze job
permissions:
  # upload analysis results to code scanning
  security-events: write
  # fetch internal or private CodeQL packs
  packages: read
  # only required for workflows in private repositories
  actions: read
  # check out the repository
  contents: read

jobs:
  analyze:
    uses: bitwise-media-group/github-workflows/.github/workflows/codeql-go.yaml@077a003a620f49bd0062c73fc761dbea05d7fb70 # v1.1.0
