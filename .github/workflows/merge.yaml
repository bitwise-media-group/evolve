# Fast-forward merge — thin caller for the org's reusable merge workflow. It drives
# both fast-forward flows from one caller: a maintainer comments `/merge` to merge
# an approved, green PR now, or arms it (`/auto-merge` comment, or the `auto-merge`
# label by hand) to merge automatically the moment it is approved and every required
# check is green. Either way the base branch is fast-forwarded to the PR head: the
# commit objects are untouched, so the original signature is preserved and
# release-please sees each Conventional Commit individually.
#
# Every trigger is one that does NOT attach a check run to the PR (issue_comment,
# workflow_run, schedule), so the merge machinery adds no skipped-job clutter to the
# PR's checks list. The approval signal is carried by the companion
# merge-review-ack.yaml (its single job is the only check this system adds) and
# re-enters here via workflow_run. The workflow_run list names every workflow that
# must pass — "Continuous Integration" (ci.yaml) and "Security Analysis"
# (security.yaml) — plus "Merge Review Ack"; whichever finishes last triggers the
# attempt, and ff-merge re-verifies all checks. The schedule sweeps armed PRs as a
# backstop. None of these run PR code; the reusable workflow only mints a token and
# calls the API.
#
# Org prerequisites (see bitwise-media-group/ff-merge): the FF_MERGE_CLIENT_ID
# variable + FF_MERGE_PRIVATE_KEY secret, and the "FF Merge" App installed on this
# repo and in main's ruleset bypass list.
#
# The reusable workflow is pinned to a full commit SHA (tag in the comment);
# Dependabot keeps the pin fresh.
name: Merge

on:
  issue_comment:
    types: [created]
  workflow_run:
    workflows:
      - Continuous Integration
      - Security Analysis
      - Merge Review Ack
    types: [completed]
  schedule:
    - cron: "17 * * * *"

# the App token does the privileged work; the caller grants nothing
permissions: {}

jobs:
  merge:
    uses: bitwise-media-group/github-workflows/.github/workflows/merge.yaml@ef97ca56a3a90f9f35556402e0c7478307edcbb9 # v3.0.0
    with:
      app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
    secrets:
      app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
