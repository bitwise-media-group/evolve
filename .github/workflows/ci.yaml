# Continuous integration — thin caller for the org's reusable ci workflow. It runs
# the canonical Makefile gates (lint, build, test) as one parallel job each, then
# Codecov uploads from coverage/cobertura-coverage.xml (coverage) and
# coverage/junit.xml (test results) — both emitted by `make test`.
# `make lint` carries all check-mode static analysis — go vet, govulncheck,
# golangci-lint, prettier --check, markdownlint, addlicense. The Go version comes
# from go.mod and the Node version from .node-version.
#
# The reusable workflow is pinned to a full commit SHA (tag in the comment) so a
# moved tag can never change what runs; Dependabot keeps the pin fresh.
name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:

# the reusable workflow's jobs only need contents:read; grant just that ceiling
permissions:
  contents: read

jobs:
  ci:
    uses: bitwise-media-group/github-workflows/.github/workflows/ci.yaml@b9c031429f149794bedb5411b08d5a787b8d9959 # v6.0.1
    with:
      # Default is go.sum; list every lockfile that affects the build. The dev
      # CLIs (golangci-lint, govulncheck, addlicense, gotestsum, ...) are pinned
      # by the toolchain submodule's config.toml/mise.lock, which the workflow
      # checks out (submodules: true) — no tools/go.sum anymore.
      # e2e/ has no external deps yet (no go.sum), but is listed so the cache key
      # tracks it once it does.
      cache-dependency-path: |
        go.sum
        e2e/go.sum
