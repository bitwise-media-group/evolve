# Tag-driven release — pushing a vX.Y.Z tag runs GoReleaser: binary archives
# + checksums + SBOMs + keyless cosign signatures on the GitHub release, a
# Homebrew cask pushed to bitwise-media-group/homebrew-tap, and a GitHub
# build-provenance attestation over everything in checksums.txt.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub release
  id-token: write # OIDC job token for cosign keyless signing
  attestations: write # actions/attest-build-provenance

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags for the changelog

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # cosign for the binary_signs keyless signing config.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # SBOMs use the syft pinned in tools/go.mod (invoked via `go tool`
      # by the sboms config) — no separate syft install step.
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to bitwise-media-group/homebrew-tap — the
          # default GITHUB_TOKEN cannot push the cask to another repository.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      # Attest build provenance for every file listed in checksums.txt
      # (archives + SBOMs + signature bundles). Verify with:
      #   gh attestation verify --owner bitwise-media-group <file>
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: ./dist/checksums.txt
