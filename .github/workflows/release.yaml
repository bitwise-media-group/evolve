# Release pipeline — thin caller for the org's reusable release workflow.
# release-please watches main and keeps a release PR current from the Conventional
# Commit history; when that PR merges the workflow cuts the draft GitHub release +
# vX.Y.Z tag and GoReleaser adopts it — binary archives + checksums + SBOMs +
# keyless cosign signatures, the Homebrew cask pushed to
# bitwise-media-group/homebrew-tap, and a SLSA build-provenance attestation over
# everything in checksums.txt.
#
# When that release is cut the reusable workflow's docs job (keyed off the
# zensical.toml at the repo root) also runs: it rebuilds the Zensical documentation
# site with `uv run zensical build` and publishes it to GitHub Pages via the Actions
# deployment (Settings → Pages → Source → GitHub Actions), in parallel with
# GoReleaser. Its checkout pulls Git LFS, so the LFS-tracked screenshots under
# docs/assets/ embed as real images. The published site therefore tracks the released
# version rather than the tip of main; the caller only has to grant the docs job
# `pages: write` below.
#
# vanity-tags is left at its default (false): evolve is a versioned Go binary whose
# consumers pin exact vX.Y.Z tags, not floating v1 / v1.1 majors.
#
# app-client-id/app-private-key author the release-please PR as the "FF Merge" App
# instead of the GITHUB_TOKEN. A GITHUB_TOKEN-authored push fires no workflow_run,
# so a release PR opened that way never triggers the auto-merge in merge.yaml;
# authoring it as the App makes the release PR auto-merge once approved and green,
# like any other.
#
# The reusable workflow is pinned to a full commit SHA (tag in the comment) so a
# moved tag can never change what runs; Dependabot keeps the pin fresh.
name: Release

on:
  push:
    branches: [main]
  # allow cutting a release manually from the Actions tab
  workflow_dispatch:

permissions: {}

jobs:
  release:
    uses: bitwise-media-group/github-workflows/.github/workflows/release.yaml@27fe5361320037b035595ecbeefe64b06fd54178 # v4.0.4
    # ceiling for the reusable workflow's release-please + goreleaser + docs jobs.
    # GitHub resolves a reusable workflow's permissions as the union of every job and
    # ignores `if:`, so the caller must grant the goreleaser job's id-token /
    # attestations / artifact-metadata and the docs job's pages even though each is
    # only realized on its own path (goreleaser needs a .goreleaser.yaml, docs a
    # zensical.toml).
    permissions:
      # create the release/tag and upload assets
      contents: write
      # release-please creates pr labels via the issues api
      issues: write
      # release-please opens the release pull request
      pull-requests: write
      # cosign keyless signing (goreleaser) + the docs job's Pages OIDC deploy
      id-token: write
      # github build-provenance attestation
      attestations: write
      # artifact storage record for the attestation
      artifact-metadata: write
      # publish the docs site to GitHub Pages (docs job, keyed off zensical.toml)
      pages: write
    with:
      # author the release PR as the FF Merge App so it can auto-merge (a
      # GITHUB_TOKEN-authored push fires no workflow_run to trigger the merge)
      app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
    secrets:
      # private key for the App that authors the release PR (same App as /merge)
      app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
      # PAT with write access to bitwise-media-group/homebrew-tap — the default
      # GITHUB_TOKEN cannot push the cask to another repository.
      homebrew-tap-token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
