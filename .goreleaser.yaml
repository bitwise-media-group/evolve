version: 2

# ^ref: https://goreleaser.com/errors/multiple-tokens/
force_token: github

# ^ref: https://goreleaser.com/customization/project/
project_name: evolve

# ^ref: https://goreleaser.com/customization/hooks/
before:
  hooks:
    - go mod download
    # Build the embedded report-viewer SPA so the -tags=withui build below can
    # embed internal/web/ui/dist (git-ignored, like the docs site).
    - npm --prefix internal/web/ui ci --no-fund --no-audit
    - npm --prefix internal/web/ui run build

# ^ref: https://goreleaser.com/customization/env/
env:
  - CGO_ENABLED=0

# ^ref: https://goreleaser.com/customization/build/
builds:
  - id: evolve
    main: ./cmd/evolve
    binary: evolve
    flags:
      - -trimpath
    # withui embeds the report-viewer SPA built in the before-hook above.
    tags:
      - withui
    ldflags:
      - -s -w
      - -X github.com/bitwise-media-group/evolve/internal/version.Version={{ .Version }}
      - -X github.com/bitwise-media-group/evolve/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/bitwise-media-group/evolve/internal/version.BuildDate={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

# ^ref: https://goreleaser.com/customization/archive/
archives:
  - id: evolve
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      # Ship the man pages in the archive so the Homebrew cask can install
      # them from the extracted tarball (see homebrew_casks.manpages below).
      - docs/man/*.1
      # Pre-generated shell completions (committed by `mise run docs`), so
      # the cask installs them as static files instead of executing the
      # binary at install time (see homebrew_casks.completions below).
      - completions/*

# ^ref: https://goreleaser.com/customization/checksum/
checksum:
  name_template: checksums.txt

# ^ref: https://goreleaser.com/customization/sign/sign/
binary_signs:
  - cmd: cosign
    signature: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}.sigstore.json"
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes
    output: true

# ^ref: https://goreleaser.com/customization/sbom/
sboms:
  - artifacts: archive
    # syft is installed from the make/ library's .syft-version pin into .bin/,
    # which the library's snapshot/release targets put on PATH.
    cmd: syft
    args:
      - $artifact
      - --output
      - spdx-json=$document

# ^ref: https://goreleaser.com/customization/publish/snapshots/
snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

# ^ref: https://goreleaser.com/customization/publish/changelog/
changelog:
  sort: asc
  use: github
  format: '{{ .SHA }}: {{ .Message }}{{ if and (not .IsNightly) .Logins }} ({{ .Logins | englishJoin }}){{ end }}'

  filters:
    exclude:
      - "^test"
      - "^chore"
      - "^build"
  groups:
    - title: "New Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 100
    - title: "Security Updates"
      regexp: '^.*?sec(\(.+\))??!?:.+$'
      order: 150
    - title: "Bug Fixes"
      regexp: '^.*?(fix|refactor)(\(.+\))??!?:.+$'
      order: 200
    - title: "Documentation Updates"
      regexp: ^.*?docs?(\(.+\))??!?:.+$
      order: 400
    - title: Other Work
      order: 9999

# ^ref: https://goreleaser.com/customization/publish/scm/
release:
  github:
    owner: bitwise-media-group
    name: evolve
  # The release-please job in release.yaml leaves a draft release named after
  # the tag it pushes. Adopt that draft instead of creating a second release,
  # swap its release-please notes for the grouped changelog above, and
  # undraft it only once every asset has been uploaded.
  use_existing_draft: true
  mode: replace

# ^ref: https://goreleaser.com/customization/publish/homebrew_casks/
homebrew_casks:
  - name: evolve
    binaries: [evolve]
    # Glob-matched against the files bundled into the archive above; goreleaser
    # emits a `manpage "..."` stanza for each match (e.g. docs/man/evolve.1).
    manpages:
      - docs/man/*.1
    # Static completion stanzas, NOT generate_completions_from_executable:
    # Homebrew installs cask artifacts in a fixed type-based order, but
    # GeneratedCompletion is missing from that sort table (as of brew 6.0),
    # so its position is decided by an unstable sort — it can run before the
    # quarantine-clearing preflight below, executing the still-quarantined
    # binary and tripping Gatekeeper mid-install. Static bash_completion /
    # zsh_completion / fish_completion artifacts are ordered deterministically
    # and never execute the binary.
    completions:
      bash: completions/evolve.bash
      zsh: completions/evolve.zsh
      fish: completions/evolve.fish
    homepage: https://github.com/bitwise-media-group/evolve
    description: Evaluate coding-agent plugins — static checks, trigger-accuracy evals, behavioral cases, and reports
    skip_upload: auto
    repository:
      owner: bitwise-media-group
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    hooks:
      pre:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/evolve"]
          end
